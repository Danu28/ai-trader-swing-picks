name: Daily Swing Picks Scan

on:
  schedule:
    - cron: '30 11 * * *'   # 5:00 PM IST (11:30 AM UTC) daily
  workflow_dispatch:         # manual trigger from Actions tab

# Grant the GITHUB_TOKEN permissions needed for Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 360     # 6-hour safety ceiling — first full run < 60 min, subsequent < 5 min

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy

      - name: Set cache date key
        run: echo "CACHE_DATE=$(date +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Restore market data from cache
        id: db-cache
        uses: actions/cache@v3
        with:
          path: data/market_data.db
          key: market-data-${{ env.CACHE_DATE }}
          restore-keys: market-data-

      - name: Initialize database (idempotent)
        run: python scripts/init_db.py

      - name: Run pipeline
        run: python scripts/pipeline.py --full --top 5

      - name: Prepare report for Pages
        run: |
          mkdir -p pages-deploy
          cp docs/index.html pages-deploy/
          cp output/swing_report_*.html pages-deploy/report.html 2>/dev/null || echo "No HTML report found — check pipeline output above"
          echo "=== pages-deploy contents ==="
          ls -la pages-deploy/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages-deploy/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
